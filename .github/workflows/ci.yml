name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: |
          uv venv
          uv pip install -r pyproject.toml --extra dev

      - name: Lint code
        run: |
          source .venv/bin/activate
          ruff check src/ tests/ || true
          ruff format --check src/ tests/ || true

      - name: Run tests with coverage
        run: |
          source .venv/bin/activate
          pytest --cov --cov-report=xml --cov-report=term

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  build:
    name: Build Container
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Podman
        run: |
          sudo apt-get update
          sudo apt-get -y install podman

      - name: Build container image
        run: |
          podman build -t object-storage-service:${{ github.sha }} .
          podman build -t object-storage-service:latest .

      - name: Test container
        run: |
          podman run -d --name test-container -p 8080:8080 object-storage-service:latest
          sleep 5
          curl -f http://localhost:8080/health || exit 1
          podman stop test-container
          podman rm test-container
